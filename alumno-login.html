<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso alumno · Aprende y Repasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>
  window.BASE_PATH = "";
  window.CURRENT_PAGE = "alumno-login";
</script>
</head>
<body>

<div class="app-shell">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="content-wrap">
    <div class="topbar">
      <button class="topbar-menu-btn" id="menu-toggle">Menú</button>
      <span class="topbar-title">Aprende y Repasa</span>
    </div>

    <main class="content">
      <header class="content-header">
        <p class="eyebrow">Acceso</p>
        <h1>Tengo una clave de alumno</h1>
        <p class="content-subtitle">Introduce la clave que te ha dado tu profesor o profesora. A partir de ahora, tu progreso se guardará también para que puedan verlo.</p>
      </header>

      <div class="game-card generator-card auth-card">
        <form id="student-login-form">
          <div class="generator-field">
            <label for="student-code">Tu clave</label>
            <input type="text" id="student-code" class="generator-select" maxlength="8" autocomplete="off" autocapitalize="characters" required>
          </div>
          <p class="auth-error" id="student-login-error"></p>
          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        <p class="content-subtitle" id="current-student-info"></p>
      </div>
    </main>

    <footer class="site-footer">
      Hecho para el aula y para repasar en casa · 5º y 6º de Primaria
    </footer>
  </div>
</div>

<script src="js/layout.js"></script>
<script src="js/firebase-config.js"></script>
<script type="module" src="js/firebase-init.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/cloud-sync.js"></script>
<script type="module" src="js/alumno-login.js"></script>
</body>
</html>
